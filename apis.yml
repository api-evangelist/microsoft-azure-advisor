aid: microsoft-azure-advisor
name: Microsoft Azure Advisor
description: >-
  Microsoft Azure Advisor is a personalized cloud consultant that helps you
  follow best practices to optimize your Azure deployments. It analyzes your
  resource configuration and usage telemetry, then recommends solutions to
  improve the cost effectiveness, performance, reliability, security, and
  operational excellence of your Azure resources.
